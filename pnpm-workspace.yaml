packages:
  - "packages/*"
  - "apps/*"

# Approve build scripts for the native deps that ship prebuilt binaries. Without
# this a fresh CI install (EAS) fails with ERR_PNPM_IGNORED_BUILDS (fatal under
# CI=true in pnpm 10+).
allowBuilds:
  esbuild: true
  "@tailwindcss/oxide": true
  "@parcel/watcher": true
